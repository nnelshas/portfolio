        highlights:
          - "**PhD Thesis**: *Multi-material Mass Flow Monitoring and Control for Powder-Blown Directed Energy Deposition* — developing real-time sensing and control systems for advanced metal additive manufacturing."
          - "Designed and deployed a **nonlinear Kalman filter** for real-time multi-physics sensor fusion and state estimation on a high-speed physical testbed — sub-millisecond cycle times, robust to sensor dropout."
          - "Developed **MRAC with Lyapunov-stable parameter adaptation** for feedforward control of a nonlinear powder transport system with 10–60s delays; derived adaptation laws from Lyapunov stability theory; achieved **70% fluctuation mitigation** in preliminary implementation."
          - "Engineered a **multi-physics sensor array** (piezoelectric, triboelectric, optical attenuation, optical reflection) for real-time in-line powder mass flow monitoring — 4 novel sensor modalities validated, 3 patents pending."
          - "Deployed a **Deep RL (PPO) agent** to achieve robust feed-forward control of a nonlinear high-delay system; achieved 3× reduction in tracking error vs. classical baselines with zero-shot sim-to-real transfer."
          - "Manage the Rapid Prototyping and Electronics Lab; **trained 55 undergraduates** in manufacturing, mentored 4 graduate researchers."

